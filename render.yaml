# Render.com blueprint — deploy PinForge Autopilot 24/7 (web + Postgres + Redis).
# Pasi: pune acest repo pe GitHub -> Render -> New -> Blueprint -> alege repo.
# Apoi completeaza variabilele PINTEREST_* (din developers.pinterest.com).
services:
  - type: web
    name: pinforge-autopilot
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pinforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pinforge-redis
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PINTEREST_CLIENT_ID
        sync: false
      - key: PINTEREST_CLIENT_SECRET
        sync: false
      - key: PINTEREST_REDIRECT_URI
        sync: false

  - type: redis
    name: pinforge-redis
    plan: starter
    ipAllowList: []

databases:
  - name: pinforge-db
    plan: starter
