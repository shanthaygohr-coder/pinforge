# Optional: deploy pe Render (web + Postgres). Fara Redis (publicare prin cron).
# Varianta 100% gratuita recomandata: Supabase (DB) + un host gratuit + cron-job.org.
services:
  - type: web
    name: pinforge-autopilot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # pune connection string-ul de la Supabase/Neon
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: PINTEREST_CLIENT_ID
        sync: false
      - key: PINTEREST_CLIENT_SECRET
        sync: false
      - key: PINTEREST_REDIRECT_URI
        sync: false
